# Prometheus configuration for Shortz Monitoring
# Scrapes the monitoring API's /metrics endpoint

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "shortz-monitor"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["shortz-monitor:8070"]
        labels:
          service: "shortz"
          environment: "production"

  # Optional: scrape Grafana's own metrics
  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]
