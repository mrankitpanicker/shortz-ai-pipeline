# =========================================================
# Shortz Monitoring — Docker Compose (Observability Stack)
# =========================================================
#
# Usage:
#   docker compose -f docker-compose.yml -f docker/docker-compose.monitoring.yml up -d
#
# This extends the base docker-compose.yml with:
#   - shortz-monitor  (monitoring API on port 8070)
#   - prometheus      (scrapes /metrics, port 9090)
#   - grafana         (dashboards, port 3000)
# =========================================================

version: "3.9"

services:

  # ---------------------------------------------------
  # Shortz Monitoring API
  # ---------------------------------------------------
  shortz-monitor:
    build:
      context: ..
      dockerfile: dockerfile
    command: [ "python", "-m", "monitoring.monitoring_api" ]
    ports:
      - "8070:8070"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ../logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8070/health')" ]
      interval: 15s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------
  # Prometheus
  # ---------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    depends_on:
      - shortz-monitor
    restart: unless-stopped

  # ---------------------------------------------------
  # Grafana
  # ---------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.1
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=shortz
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/shortz_dashboard.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
